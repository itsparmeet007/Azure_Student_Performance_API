<!DOCTYPE html>
<html>

<head>
    <title>Student Performance Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        
        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        
        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }
        
        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        h2 {
            color: green;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Student Performance Predictor</h1>

        <form action="/predict-form" method="post">

            <input type="number" name="age" placeholder="Age" required><br>
            <input type="number" name="absences" placeholder="Absences" required><br>
            <input type="number" name="study_time" placeholder="Study Time (1-4)" required><br>
            <input type="number" name="travel_time" placeholder="Travel Time (1-4)" required><br>
            <input type="number" name="grade_1" placeholder="Grade 1" required><br>
            <input type="number" name="grade_2" placeholder="Grade 2" required><br>

            <button type="submit">Predict</button>
        </form>

        {% if prediction %}
        <h2>Predicted Final Grade: {{ prediction }}</h2>
        {% endif %}

    </div>

</body>

</html>
